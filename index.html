<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Gestión - Panther</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.bundle.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="estilos.css" />
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 border-bottom border-secondary"
    >
      <div class="container-fluid">
        <a class="navbar-brand font-weight-bold text-info" href="#"
          >Panther App</a
        >
        <div class="navbar-nav">
          <button class="nav-link btn-nav active" id="nav-personas">
            Personas
          </button>
          <button class="nav-link btn-nav" id="nav-documentos">
            Documentos
          </button>
        </div>
      </div>
    </nav>

    <div class="container pb-5">
      <div id="seccion-personas">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2>Gestión de Personas</h2>
          <button class="btn btn-primary" onclick="abrirModalPersona()">
            + Nueva Persona
          </button>
        </div>
        <div class="card">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-dark table-hover mb-0">
                <thead>
                  <tr>
                    <th>Documento</th>
                    <th>Nombres</th>
                    <th>Apellidos</th>
                    <th>Celular</th>
                    <th>Ubicación</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="tabla-personas-cuerpo"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div id="seccion-documentos" class="oculto">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2>Tipos de Documento</h2>
          <button class="btn btn-primary" onclick="abrirModalDocumento()">
            + Nuevo Documento
          </button>
        </div>
        <div class="card">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-dark table-hover mb-0">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Abreviatura</th>
                    <th>Descripción</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="tabla-documentos-cuerpo"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modal-persona"
      data-bs-backdrop="static"
      tabindex="-1"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="titulo-modal-persona">Nueva Persona</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <form id="form-persona">
            <div class="modal-body">
              <input type="hidden" id="persona-id" />

              <div class="fila-doble mb-3">
                <div>
                  <label for="persona-tipo-doc" class="form-label"
                    >Tipo Documento</label
                  >
                  <select
                    id="persona-tipo-doc"
                    class="form-select"
                    required
                  ></select>
                </div>
                <div>
                  <label for="persona-documento" class="form-label"
                    >Número Documento</label
                  >
                  <input
                    type="text"
                    id="persona-documento"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="fila-doble mb-3">
                <div>
                  <label for="persona-nombre" class="form-label">Nombres</label>
                  <input
                    type="text"
                    id="persona-nombre"
                    class="form-control"
                    required
                  />
                </div>
                <div>
                  <label for="persona-apellido" class="form-label"
                    >Apellidos</label
                  >
                  <input
                    type="text"
                    id="persona-apellido"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="fila-doble mb-3">
                <div>
                  <label for="persona-celular" class="form-label"
                    >Celular</label
                  >
                  <input
                    type="text"
                    id="persona-celular"
                    class="form-control"
                    required
                  />
                </div>
                <div>
                  <label for="persona-email" class="form-label"
                    >Correo Electrónico</label
                  >
                  <input
                    type="email"
                    id="persona-email"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="mb-3">
                <label for="persona-pais" class="form-label">País</label>
                <select
                  id="persona-pais"
                  class="form-select"
                  style="width: 100%"
                >
                  <option value="">-- Seleccione un país --</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="persona-estado" class="form-label"
                  >Departamento / Estado</label
                >
                <select
                  id="persona-estado"
                  class="form-select"
                  style="width: 100%"
                  disabled
                >
                  <option value="">-- Seleccione primero un país --</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="persona-ciudad" class="form-label"
                  >Ciudad / Municipio</label
                >
                <select
                  id="persona-ciudad"
                  class="form-select"
                  style="width: 100%"
                  disabled
                >
                  <option value="">
                    -- Seleccione primero un departamento --
                  </option>
                </select>
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>
              <button type="submit" class="btn btn-success">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modal-documento"
      data-bs-backdrop="static"
      tabindex="-1"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="titulo-modal-documento">
              Nuevo Tipo de Documento
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <form id="form-documento">
            <div class="modal-body">
              <input type="hidden" id="documento-id" />
              <div class="mb-3">
                <label for="documento-sigla" class="form-label"
                  >Abreviatura / Sigla</label
                >
                <input
                  type="text"
                  id="documento-sigla"
                  class="form-control"
                  required
                  placeholder="Ej: CC"
                />
              </div>
              <div class="mb-3">
                <label for="documento-descripcion" class="form-label"
                  >Descripción</label
                >
                <input
                  type="text"
                  id="documento-descripcion"
                  class="form-control"
                  required
                  placeholder="Ej: Cédula de Ciudadanía"
                />
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>
              <button type="submit" class="btn btn-success">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modal-confirmar" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">¿Confirmar acción?</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <p id="mensaje-confirmar">
              ¿Está seguro de eliminar este registro?
            </p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              No
            </button>
            <button type="button" class="btn btn-danger" id="btn-confirmar-si">
              Sí, Eliminar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
